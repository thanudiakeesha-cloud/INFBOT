[phases.setup]
nixPkgs = [
  "nodejs_20",
  "ffmpeg",
  "pkg-config",
  "cairo",
  "pango",
  "libpng",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "python3",
  "git",
  "openssh",
